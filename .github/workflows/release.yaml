name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    name: Build release asset
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v6

      - name: Create trafiklab.zip
        working-directory: custom_components/trafiklab
        run: zip -r ../../../trafiklab.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: trafiklab.zip
          overwrite_files: true
