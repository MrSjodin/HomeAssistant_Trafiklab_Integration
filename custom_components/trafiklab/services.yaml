stop_lookup:
  name: Stop lookup
  description: Search for public transport stops by name using Trafiklab API
  fields:
    api_key:
      name: API Key
      description: Your Trafiklab API key
      required: true
      selector:
        text:
          type: password
    search_query:
      name: Search query
      description: Search string to find stops (minimum 1 character)
      required: true
      example: "Stockholm"
      selector:
        text:

update_now:
  name: Update now
  description: Force an immediate data refresh from the Trafiklab API for one or all config entries.
  fields:
    config_entry_id:
      name: Config entry ID
      description: ID of a specific Trafiklab config entry to refresh. Omit to refresh all entries.
      required: false
      selector:
        config_entry:
          integration: trafiklab
